version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.4-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-marketplace}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-marketplace_secure_redis_pass}
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    command: daphne -b 0.0.0.0 -p 8000 core.asgi:application
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-marketplace}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-marketplace_secure_redis_pass}@redis:6379/0
      - PAYPHONE_TOKEN=${PAYPHONE_TOKEN:-""}
    depends_on:
      - db
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=/api
      - INTERNAL_API_URL=http://backend:8000/api
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
